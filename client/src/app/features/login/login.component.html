<section class="login-shell">
  <div class="login-copy">
    <p class="eyebrow">Role based secure access</p>
    <h1>One workspace, two access levels, clear API behavior.</h1>
    <p>
      Sign in as an admin to manage users, or as a general user to see only assigned records.
    </p>
  </div>

  <form class="panel login-card" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
    <div>
      <h2>Login</h2>
      <p>Use the seeded credentials or create users from the admin screen.</p>
    </div>

    <label class="field">
      <span>User ID</span>
      <input type="text" formControlName="userId" autocomplete="username">
      <small class="field-error" *ngIf="userIdInvalid">User ID is required.</small>
    </label>

    <label class="field">
      <span>Password</span>
      <input type="password" formControlName="password" autocomplete="current-password">
      <small class="field-error" *ngIf="passwordInvalid">Password is required.</small>
    </label>

    <label class="field">
      <span>Role</span>
      <select formControlName="role">
        <option *ngFor="let role of roles" [ngValue]="role">{{ role }}</option>
      </select>
    </label>

    <label class="field">
      <span>API delay in milliseconds</span>
      <input type="number" min="0" max="5000" formControlName="delayMs">
      <small class="field-error" *ngIf="delayInvalid">Delay must be between 0 and 5000 ms.</small>
    </label>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button class="primary-button" type="submit" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign in' }}
    </button>
  </form>
</section>
